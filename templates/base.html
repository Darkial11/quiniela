{% load static %}

<!doctype html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Quiniela Mundial 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/quiniela.css' %}">
    <link rel="stylesheet" href="{% static 'css/ranking.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/contacto.css' %}">

</head>

<body>

<div class="app-layout">

    {% if request.user.is_authenticated %}

    <!-- OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">

        <div class="sidebar-top">

            <div class="sidebar-logo">
                <img src="{% static 'img/logo_fut_white.png' %}" alt="LukiFix">
            </div>

            <div class="sidebar-user">
                <span>Bienvenid@</span>
                <h3>{{ request.user.perfil.nick }}</h3>
            </div>

        </div>

        <nav class="sidebar-nav">

            <a href="/dashboard/" class="{% if '/dashboard' in request.path %}active-link{% endif %}">
                Dashboard
            </a>

            <a href="/quiniela/" class="{% if '/quiniela' in request.path or '/jornada/' in request.path %}active-link{% endif %}">
                Quiniela
            </a>

            <a href="/pronosticos/" class="{% if '/pronosticos' in request.path %}active-link{% endif %}">
                Pronósticos
            </a>

            <a href="/ranking/" class="{% if '/ranking' in request.path %}active-link{% endif %}">
                Ranking
            </a>

            <a href="/reglamento/" class="{% if '/reglamento' in request.path %}active-link{% endif %}">
                Reglamento
            </a>

            <a href="/contacto/" class="{% if '/contacto' in request.path %}active-link{% endif %}">
                Contacto
            </a>

        </nav>

        <div class="sidebar-bottom">
            <a href="/logout/" class="logout-btn">Salir</a>
        </div>

    </aside>

    <!-- TOPBAR MÓVIL -->
    <div class="mobile-topbar">

        <div class="mobile-topbar-left">
            <img src="{% static 'img/logo_fut_white.png' %}" alt="LukiFix" class="mobile-logo">
        </div>

        <div class="mobile-topbar-center">
            <span class="mobile-welcome">Bienvenid@</span>
            <span class="mobile-nick">{{ request.user.perfil.nick }}</span>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Menú">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </div>

    {% endif %}

    <main class="main-area">
        {% block content %}
        {% endblock %}
    </main>

</div>

<script>
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    function abrirMenu() {
        sidebar.classList.add('sidebar-open');
        overlay.classList.add('overlay-visible');
        hamburgerBtn.classList.add('hamburger-active');
        document.body.style.overflow = 'hidden';
    }

    function cerrarMenu() {
        sidebar.classList.remove('sidebar-open');
        overlay.classList.remove('overlay-visible');
        hamburgerBtn.classList.remove('hamburger-active');
        document.body.style.overflow = '';
    }

    if (hamburgerBtn) {
        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.contains('sidebar-open')
                ? cerrarMenu()
                : abrirMenu();
        });
    }

    if (overlay) {
        overlay.addEventListener('click', cerrarMenu);
    }

// Cierra el menú al tocar un link
    if (sidebar) {
        sidebar.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', cerrarMenu);
        });
    }

    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.style.color = '#22c55e';
        } else {
            input.type = 'password';
            icon.style.color = '#64748b';
        }
    }
</script>

</body>

</html>
