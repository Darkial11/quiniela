{% load static %}

<!doctype html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

<title>Quiniela</title>

    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#071425">

    <link rel="apple-touch-icon" href="{% static 'img/icons/icon-192.png' %}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quiniela">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
    <link rel="stylesheet" href="{% static 'css/quiniela.css' %}">
    <link rel="stylesheet" href="{% static 'css/ranking.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/contacto.css' %}">

</head>

<body>

<div class="app-layout">

    {% if request.user.is_authenticated %}

    <!-- OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">

        <div class="sidebar-top">

            <div class="sidebar-logo">
                <img src="{% static 'img/logo_fut_white.png' %}" alt="LukiFix">
            </div>

            <div class="sidebar-user">
                <span>Bienvenid@</span>
                <h3>{{ request.user.perfil.nick }}</h3>
            </div>

        </div>

        <nav class="sidebar-nav">

            {% if torneo_actual %}

            <a href="/{{ torneo_actual.slug }}/" class="{% if torneo_actual.slug in request.path and '/pronosticos' not in request.path and '/ranking' not in request.path %}active-link{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line><line x1="8" y1="3" x2="8" y2="7"></line><line x1="16" y1="3" x2="16" y2="7"></line></svg>
                Quiniela
            </a>

            <a href="/{{ torneo_actual.slug }}/pronosticos/" class="{% if '/pronosticos' in request.path %}active-link{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M18 6l-2.5 2.5M8.5 15.5L6 18"></path></svg>
                Pronósticos
            </a>

            <a href="/{{ torneo_actual.slug }}/ranking/" class="{% if '/ranking' in request.path %}active-link{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v4a6 6 0 0 1-12 0V4z"></path><path d="M6 6H3v1a4 4 0 0 0 4 4"></path><path d="M18 6h3v1a4 4 0 0 1-4 4"></path><line x1="12" y1="14" x2="12" y2="18"></line><line x1="9" y1="20" x2="15" y2="20"></line></svg>
                Ranking
            </a>

            <a href="/{{ torneo_actual.slug }}/reglamento/" class="{% if '/reglamento' in request.path %}active-link{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h8l4 4v14H7z"></path><path d="M15 3v4h4"></path><line x1="9" y1="12" x2="15" y2="12"></line><line x1="9" y1="16" x2="15" y2="16"></line></svg>
                Reglamento
            </a>

            {% endif %}

            <a href="/contacto/" class="{% if '/contacto' in request.path %}active-link{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 7l9 6 9-6"></path></svg>
                Contacto
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="/logout/" class="logout-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Salir
            </a>
        </div>

    </aside>

    <!-- TOPBAR MÓVIL -->
    <div class="mobile-topbar">

        <div class="mobile-topbar-left">
            <img src="{% static 'img/logo_fut_white.png' %}" alt="LukiFix" class="mobile-logo">
        </div>

        <div class="mobile-topbar-center">
            <span class="mobile-welcome">Bienvenid@</span>
            <span class="mobile-nick">{{ request.user.perfil.nick }}</span>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Menú">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </div>

    {% endif %}

    <main class="main-area">
        {% block content %}
        {% endblock %}
    </main>

</div>

<script>
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    function abrirMenu() {
        sidebar.classList.add('sidebar-open');
        overlay.classList.add('overlay-visible');
        hamburgerBtn.classList.add('hamburger-active');
        document.body.style.overflow = 'hidden';
    }

    function cerrarMenu() {
        sidebar.classList.remove('sidebar-open');
        overlay.classList.remove('overlay-visible');
        hamburgerBtn.classList.remove('hamburger-active');
        document.body.style.overflow = '';
    }

    if (hamburgerBtn) {
        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.contains('sidebar-open')
                ? cerrarMenu()
                : abrirMenu();
        });
    }

    if (overlay) {
        overlay.addEventListener('click', cerrarMenu);
    }

// Cierra el menú al tocar un link
    if (sidebar) {
        sidebar.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', cerrarMenu);
        });
    }

    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.style.color = '#22c55e';
        } else {
            input.type = 'password';
            icon.style.color = '#64748b';
        }
    }
</script>

</body>

</html>
