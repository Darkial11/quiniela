{% extends 'base.html' %}

{% block content %}

<div class="auth-layout">

    <div class="auth-left">

        <h1>

            Únete a la Quiniela

        </h1>

        <p class="auth-description">

            Crea tu cuenta,
            participa en jornadas
            y compite por el primer lugar del ranking.

        </p>

    </div>

    <div class="auth-card register-card">

        <h2>

            Crear Cuenta

        </h2>

        {% if error %}

        <p class="error">

            {{ error }}

        </p>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <input
                    type="text"
                    name="nombre"
                    placeholder="Nombre"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="text"
                    name="apellido"
                    placeholder="Apellido"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    autocomplete="off"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="text"
                    name="telefono"
                    placeholder="Teléfono"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="text"
                    name="nick"
                    placeholder="Nick"
                    pattern="[A-Za-z0-9_]+"
                    title="El nick solo puede contener letras, números y _"
                    required
                >

            </div>

            <div class="form-group" style="position:relative;">

                <input
                    type="password"
                    name="password"
                    id="password-registro"
                    placeholder="Contraseña"
                    autocomplete="new-password"
                    required
                    style="padding-right:48px;"
                >

                <span
                    onclick="togglePassword('password-registro', this)"
                    style="
                        position:absolute;
                        right:16px;
                        top:50%;
                        transform:translateY(-50%);
                        cursor:pointer;
                        color:#64748b;
                        font-size:20px;
                        user-select:none;
                    "
                >👁</span>

            </div>

            <div
                style="
                    margin-bottom:22px;
                    font-size:14px;
                    color:#cbd5e1;
                "
            >

                <label
                    style="
                        display:flex;
                        align-items:flex-start;
                        gap:10px;
                        line-height:1.5;
                    "
                >

                    <input
                        type="checkbox"
                        name="acepta_reglamento"
                        required

                        style="
                            width:18px;
                            height:18px;
                            margin-top:2px;
                            accent-color:#22c55e;
                            cursor:pointer;
                            flex-shrink:0;
                        "
                    >

                    <span>

                        He leído y acepto el

                        <a
                            href="/{{ torneo_actual.slug }}/reglamento/"
                            target="_blank"

                            style="
                                color:#22c55e;
                                text-decoration:underline;
                                font-weight:600;
                            "
                        >

                            reglamento de la quiniela

                        </a>

                    </span>

                </label>

            </div>
            
            <button
                type="submit"
                class="auth-btn"
            >

                Registrarme

            </button>

        </form>

        <div class="auth-footer">

            ¿Ya tienes cuenta?

            <a href="/login/">

                Iniciar sesión

            </a>

        </div>

    </div>

</div>

{% endblock %}
