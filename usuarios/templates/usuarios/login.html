{% extends 'base.html' %}

{% block content %}

<div class="auth-layout login-page">
    
    <div class="auth-left">

        <h1>

            Quiniela

        </h1>

        <p class="auth-description">

            Compite con amigos,
            escala el ranking
            y demuestra quién sabe más de fútbol.

        </p>

    </div>

    <div class="auth-card">

        <h2>

            Iniciar Sesión

        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <input
                    type="text"
                    name="username"
                    placeholder="Nick"
                    required
                >

            </div>

            <div class="form-group" style="position:relative;">

                <input
                    type="password"
                    name="password"
                    id="password-login"
                    placeholder="Contraseña"
                    required
                    style="padding-right:48px;"
                >

                <span
                    onclick="togglePassword('password-login', this)"
                    style="
                        position:absolute;
                        right:16px;
                        top:50%;
                        transform:translateY(-50%);
                        cursor:pointer;
                        color:#64748b;
                        font-size:20px;
                        user-select:none;
                    "
                >👁</span>

            </div>

            <button
                type="submit"
                class="auth-btn"
            >

                Entrar

            </button>

        </form>

        {% if mensaje %}

        <p class="error">

            {{ mensaje }}

        </p>

        {% endif %}

        <div class="auth-footer">

            <a href="/recuperar-contrasena/" style="color:#64748b; font-size:13px;">
                ¿Olvidaste tu contraseña?
            </a>

        </div>

        <div class="auth-footer">

            ¿No tienes cuenta?

            <a href="/registro/">

                Crear cuenta

            </a>

        </div>

    </div>
    
</div>

{% endblock %}
