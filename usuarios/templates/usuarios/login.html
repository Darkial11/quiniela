{% extends 'base.html' %}

{% block content %}

<div class="auth-layout">

    <div class="auth-left">

        <p class="auth-mini">

            Mundial 2026

        </p>

        <h1>

            Quiniela

        </h1>

        <p class="auth-description">

            Compite con amigos,
            escala el ranking
            y demuestra quién sabe más de fútbol.

        </p>

    </div>

    <div class="auth-card">

        <h2>

            Iniciar Sesión

        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <input
                    type="text"
                    name="username"
                    placeholder="Nick"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >

            </div>

            <button
                type="submit"
                class="auth-btn"
            >

                Entrar

            </button>

        </form>

        {% if mensaje %}

        <p class="error">

            {{ mensaje }}

        </p>

        {% endif %}

        <div class="auth-footer">

            ¿No tienes cuenta?

            <a href="/registro/">

                Crear cuenta

            </a>

        </div>

    </div>
    
</div>

{% endblock %}
